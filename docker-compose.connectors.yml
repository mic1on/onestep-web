services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: onestep_test
      MYSQL_USER: onestep
      MYSQL_PASSWORD: onestep
    ports:
      - "33306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u onestep -ponestep --silent"]
      interval: 5s
      timeout: 5s
      retries: 24

  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: onestep
      RABBITMQ_DEFAULT_PASS: onestep
    ports:
      - "35672:5672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 24

  redis:
    image: redis:7
    ports:
      - "36379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 24

  localstack:
    image: localstack/localstack:3
    environment:
      SERVICES: sqs
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    ports:
      - "4566:4566"
    healthcheck:
      test:
        - CMD-SHELL
        - >
          python -c "import json, urllib.request;
          data=json.load(urllib.request.urlopen('http://127.0.0.1:4566/_localstack/health'));
          raise SystemExit(0 if data.get('services', {}).get('sqs') in {'available', 'running'} else 1)"
      interval: 5s
      timeout: 5s
      retries: 24
